---
layout: null
title: Batch Image Compressor
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Image Compressor</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --background: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --border: #d1d5db;
        }
        body { font-family: system-ui, sans-serif; background-color: var(--background); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .app-container { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 750px; box-sizing: border-box; }
        .app-header { text-align: center; margin-bottom: 30px; position: relative; }
        .app-title { margin: 0; color: var(--primary); font-size: 1.8rem; font-weight: 800; }
        .back-btn { position: absolute; left: 0; top: 5px; background: #e0e7ff; color: var(--primary); border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; text-decoration: none; }
        .back-btn:hover { background: #c7d2fe; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input[type="file"], input[type="number"], select { width: 100%; padding: 11px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button.main-action-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button.main-action-btn:hover { background-color: var(--primary-hover); }
        button.main-action-btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .file-list-card { margin-top: 25px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; overflow: hidden; }
        .file-list-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; background: #eeeff1; padding: 12px; font-weight: 600; font-size: 0.85rem; color: #4b5563; border-bottom: 1px solid #e5e7eb; }
        .file-list-rows { max-height: 250px; overflow-y: auto; }
        .file-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 12px; font-size: 0.9rem; align-items: center; border-bottom: 1px solid #e5e7eb; background: #fff; }
        .file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #e5e7eb; color: #4b5563; }
        .status-loading { background: #dbeafe; color: #2563eb; }
        .row-download-btn { background: var(--success); color: white; border: none; padding: 5px 8px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; text-decoration: none; text-align: center; }
        #downloadAllBtn { background-color: var(--success); margin-top: 15px; display: none; }
        #downloadAllBtn:hover { background-color: var(--success-hover); }
        @media (max-width: 600px) { .back-btn { position: relative; display: block; margin-bottom: 15px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <a href="./" class="back-btn">← Home</a>
        <h2 class="app-title">Batch Image Compressor</h2>
    </div>

    <div class="form-group">
        <label for="compImageInput">Choose Images (Multiple Allowed)</label>
        <input type="file" id="compImageInput" accept="image/*" multiple>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="compTargetSize">Target Max Size (KB)</label>
            <input type="number" id="compTargetSize" value="50" min="2">
        </div>
        <div class="form-group">
            <label for="compOutputFormat">Convert To</label>
            <select id="compOutputFormat">
                <option value="image/jpeg">JPEG (.jpg)</option>
                <option value="image/webp">WEBP (.webp)</option>
                <option value="image/png">PNG (.png - Size might be large)</option>
            </select>
        </div>
    </div>
    <button id="compStartBtn" class="main-action-btn" disabled>Compress All Images</button>
    <button id="downloadAllBtn" class="main-action-btn">Download All Compressed Images</button>

    <div class="file-list-card" id="compFileListCard" style="display: none;">
        <div class="file-list-header">
            <div>FILE NAME</div><div>ORIGINAL</div><div>COMPRESSED</div><div>ACTION</div>
        </div>
        <div class="file-list-rows" id="compFileListRows"></div>
    </div>
</div>

<script>
    const compImageInput = document.getElementById('compImageInput');
    const compTargetSize = document.getElementById('compTargetSize');
    const compOutputFormat = document.getElementById('compOutputFormat');
    const compStartBtn = document.getElementById('compStartBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const compFileListCard = document.getElementById('compFileListCard');
    const compFileListRows = document.getElementById('compFileListRows');
    let compressorBatchArray = [];

    compImageInput.addEventListener('change', (e) => {
        const files = e.target.files; if (files.length === 0) { compFileListCard.style.display = 'none'; compStartBtn.disabled = true; return; }
        compressorBatchArray = []; compFileListRows.innerHTML = ''; compFileListCard.style.display = 'block'; downloadAllBtn.style.display = 'none';
        for (let i = 0; i < files.length; i++) {
            const file = files[i]; const sizeInKB = file.size / 1024;
            const baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            compressorBatchArray.push({ file: file, baseName: baseName, sizeInKB: sizeInKB, compressedBlob: null });
            const row = document.createElement('div'); row.className = 'file-row';
            row.innerHTML = `<div class="file-name" title="${file.name}">${file.name}</div><div>${sizeInKB.toFixed(1)} KB</div><div id="comp-row-size-${i}"><span class="status-badge status-pending">Pending</span></div><div id="comp-row-action-${i}">-</div>`;
            compFileListRows.appendChild(row);
        }
        compStartBtn.disabled = false; compStartBtn.innerText = `Compress All (${files.length} Files)`;
    });

    compStartBtn.addEventListener('click', async () => {
        compStartBtn.disabled = true; compStartBtn.innerText = "Processing...";
        const targetKB = parseFloat(compTargetSize.value); const format = compOutputFormat.value;
        const extension = format === 'image/jpeg' ? 'jpg' : format === 'image/png' ? 'png' : 'webp';

        for (let i = 0; i < compressorBatchArray.length; i++) {
            document.getElementById(`comp-row-size-${i}`).innerHTML = `<span class="status-badge status-loading">Shrinking...</span>`;
            
            const resultBlob = await new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(compressorBatchArray[i].file);
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    let currentWidth = img.width;
                    let currentHeight = img.height;
                    let quality = 0.85;
                    let finalBlob = null;
                    let attempts = 0;

                    // Deep compression loop that cuts down dimensions if quality adjustments fail
                    while (attempts < 15) {
                        canvas.width = currentWidth;
                        canvas.height = currentHeight;
                        ctx.clearRect(0, 0, currentWidth, currentHeight);
                        ctx.drawImage(img, 0, 0, currentWidth, currentHeight);

                        finalBlob = await new Promise(r => canvas.toBlob(r, format, format === 'image/png' ? undefined : quality));
                        let currentSizeKB = finalBlob.size / 1024;

                        // Check if we hit the target size
                        if (currentSizeKB <= targetKB) {
                            break;
                        }

                        // Step 1: If file is too large, drop quality down to 0.15 first
                        if (quality > 0.15 && format !== 'image/png') {
                            quality -= 0.15;
                        } else {
                            // Step 2: If quality is already low, forcefully scale down resolution by 25% each loop
                            currentWidth = Math.floor(currentWidth * 0.75);
                            currentHeight = Math.floor(currentHeight * 0.75);
                            if (format !== 'image/png') quality = 0.35; // Reset to reasonable low quality for new dimensions
                        }

                        // Safety exit if image becomes thumbnail sized
                        if (currentWidth < 40 || currentHeight < 40) {
                            break;
                        }
                        attempts++;
                    }
                    resolve(finalBlob);
                };
            });

            compressorBatchArray[i].compressedBlob = resultBlob;
            document.getElementById(`comp-row-size-${i}`).innerHTML = `<strong style="color:var(--success);">${(resultBlob.size/1024).toFixed(1)} KB</strong>`;
            document.getElementById(`comp-row-action-${i}`).innerHTML = `<a href="${URL.createObjectURL(resultBlob)}" download="${compressorBatchArray[i].baseName}_compressed.${extension}" class="row-download-btn">Get</a>`;
        }
        compStartBtn.innerText = "Completed!"; downloadAllBtn.style.display = "block";
    });

    downloadAllBtn.addEventListener('click', () => {
        const extension = compOutputFormat.value === 'image/jpeg' ? 'jpg' : compOutputFormat.value === 'image/png' ? 'png' : 'webp';
        compressorBatchArray.forEach(item => {
            if(item.compressedBlob) {
                const a = document.createElement('a'); a.href = URL.createObjectURL(item.compressedBlob);
                a.download = `${item.baseName}_compressed.${extension}`; a.click();
            }
        });
    });
</script>
</body>
</html>
